name: WordMagicGame
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1006016
    DEVELOPMENT_TEAM: U6A833S7Q4
    MARKETING_VERSION: 0.6.7.8
    SWIFT_VERSION: 6.0
    VERSIONING_SYSTEM: apple-generic
packages: {}
targets:
  WordMagicGame:
    type: application
    platform: iOS
    bundleId: com.terryma.wordmagicgame
    sources:
      - path: WordMagicGame
    resources:
      - path: WordMagicGame/Resources/BuiltinPacks
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: WordMagicGame/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.terryma.wordmagicgame
        PRODUCT_NAME: WordMagicGame
    dependencies: []
  WordMagicGameTests:
    type: bundle.unit-test
    platform: iOS
    bundleId: com.terryma.wordmagicgame.tests
    sources:
      - path: WordMagicGameTests
    dependencies:
      - target: WordMagicGame
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.terryma.wordmagicgame.tests
  WordMagicGameUITests:
    type: bundle.ui-testing
    platform: iOS
    bundleId: com.terryma.wordmagicgame.uitests
    sources:
      - path: WordMagicGameUITests
    dependencies:
      - target: WordMagicGame
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.terryma.wordmagicgame.uitests
schemes:
  WordMagicGame:
    build:
      targets:
        WordMagicGame: all
        WordMagicGameTests: [test]
        WordMagicGameUITests: [test]
    test:
      config: Debug
      targets:
        - WordMagicGameTests
        - WordMagicGameUITests
    run:
      config: Debug
