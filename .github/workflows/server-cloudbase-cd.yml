name: server-cloudbase-cd

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/server-cloudbase-cd.yml"

concurrency:
  group: server-cloudbase-cd
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: server / cloudbase deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    env:
      HAS_TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID != '' }}
      HAS_TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY != '' }}
      HAS_TCB_ENV_ID: ${{ secrets.TCB_ENV_ID != '' }}
      HAS_CLOUDBASE_PROD_BASE_URL: ${{ secrets.CLOUDBASE_PROD_BASE_URL != '' }}
    steps:
      - name: CloudBase deploy gate
        working-directory: .
        run: |
          set -euo pipefail
          echo "HAS_TCB_SECRET_ID=${HAS_TCB_SECRET_ID}"
          echo "HAS_TCB_SECRET_KEY=${HAS_TCB_SECRET_KEY}"
          echo "HAS_TCB_ENV_ID=${HAS_TCB_ENV_ID}"
          echo "HAS_CLOUDBASE_PROD_BASE_URL=${HAS_CLOUDBASE_PROD_BASE_URL}"
          if [ "${HAS_TCB_SECRET_ID}" != "true" ] || \
             [ "${HAS_TCB_SECRET_KEY}" != "true" ] || \
             [ "${HAS_TCB_ENV_ID}" != "true" ] || \
             [ "${HAS_CLOUDBASE_PROD_BASE_URL}" != "true" ]; then
            echo "::warning::CloudBase deploy skipped: configure TCB_SECRET_ID, TCB_SECRET_KEY, TCB_ENV_ID, and CLOUDBASE_PROD_BASE_URL."
          fi

      - name: Checkout
        if: ${{ env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' && env.HAS_CLOUDBASE_PROD_BASE_URL == 'true' }}
        uses: actions/checkout@v5

      - name: Set up Python
        if: ${{ env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' && env.HAS_CLOUDBASE_PROD_BASE_URL == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        if: ${{ env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' && env.HAS_CLOUDBASE_PROD_BASE_URL == 'true' }}
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync dependencies
        if: ${{ env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' && env.HAS_CLOUDBASE_PROD_BASE_URL == 'true' }}
        run: uv sync --dev

      - name: Run pytest
        if: ${{ env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' && env.HAS_CLOUDBASE_PROD_BASE_URL == 'true' }}
        run: uv run pytest -v

      - name: Set up Node
        if: ${{ env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' && env.HAS_CLOUDBASE_PROD_BASE_URL == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install CloudBase CLI
        if: ${{ env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' && env.HAS_CLOUDBASE_PROD_BASE_URL == 'true' }}
        run: npm install -g @cloudbase/cli

      - name: Login to CloudBase
        if: ${{ env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' && env.HAS_CLOUDBASE_PROD_BASE_URL == 'true' }}
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"

      - name: Capture CloudBase deploy marker
        if: ${{ env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' && env.HAS_CLOUDBASE_PROD_BASE_URL == 'true' }}
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          set -euo pipefail
          tcb api tcbr DescribeCloudRunDeployRecord \
            --api-version 2022-02-17 \
            -e "$TCB_ENV_ID" \
            --body "{\"EnvId\":\"$TCB_ENV_ID\",\"ServerName\":\"happyword-server\"}" \
            --json > /tmp/cloudbase-deploy-record-before.json
          node <<'NODE' >> "$GITHUB_ENV"
          const fs = require("node:fs");

          const raw = fs.readFileSync("/tmp/cloudbase-deploy-record-before.json", "utf8");
          const jsonStart = raw.indexOf("{");
          const payload = JSON.parse(jsonStart >= 0 ? raw.slice(jsonStart) : raw);
          const records = payload.data?.DeployRecords ?? [];
          const latest = records[records.length - 1];
          console.log(`CLOUDBASE_PREVIOUS_DEPLOY_ID=${latest?.DeployId ?? ""}`);
          NODE

      - name: Deploy CloudBase Run
        if: ${{ env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' && env.HAS_CLOUDBASE_PROD_BASE_URL == 'true' }}
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          set -euo pipefail
          printf '\n' | tcb cloudrun deploy -e "$TCB_ENV_ID" -s happyword-server --port 8080 --source . --force

      - name: Wait for CloudBase deployment
        if: ${{ env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' && env.HAS_CLOUDBASE_PROD_BASE_URL == 'true' }}
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const { execFileSync } = require("node:child_process");

          const envId = process.env.TCB_ENV_ID;
          const previousDeployId = process.env.CLOUDBASE_PREVIOUS_DEPLOY_ID ?? "";
          const serverName = "happyword-server";
          const deadline = Date.now() + 10 * 60 * 1000;

          function sleep(ms) {
            Atomics.wait(new Int32Array(new SharedArrayBuffer(4)), 0, 0, ms);
          }

          function latestDeployRecord() {
            const raw = execFileSync(
              "tcb",
              [
                "api",
                "tcbr",
                "DescribeCloudRunDeployRecord",
                "--api-version",
                "2022-02-17",
                "-e",
                envId,
                "--body",
                JSON.stringify({ EnvId: envId, ServerName: serverName }),
                "--json",
              ],
              { encoding: "utf8" },
            );
            const jsonStart = raw.indexOf("{");
            const payload = JSON.parse(jsonStart >= 0 ? raw.slice(jsonStart) : raw);
            const records = payload.data?.DeployRecords ?? [];
            return records[records.length - 1];
          }

          while (Date.now() < deadline) {
            const latest = latestDeployRecord();
            if (!latest) {
              throw new Error("CloudBase deploy record list is empty");
            }
            console.log(
              [
                `deploy=${latest.DeployId}`,
                `status=${latest.Status}`,
                `build=${latest.BuildId}`,
                `traffic=${latest.FlowRatio}`,
                `hasTraffic=${latest.HasTraffic}`,
              ].join(" "),
            );
            if (latest.DeployId !== previousDeployId && latest.Status === "deploy_failed") {
              throw new Error(`CloudBase deploy ${latest.DeployId} failed`);
            }
            if (
              latest.DeployId !== previousDeployId &&
              latest.Status === "normal" &&
              Number(latest.BuildId) > 0 &&
              String(latest.FlowRatio) === "100" &&
              latest.HasTraffic === true
            ) {
              process.exit(0);
            }
            sleep(15000);
          }

          throw new Error("Timed out waiting for a new CloudBase deploy to receive 100% traffic");
          NODE

      - name: Health check
        if: ${{ env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' && env.HAS_CLOUDBASE_PROD_BASE_URL == 'true' }}
        env:
          CLOUDBASE_PROD_BASE_URL: ${{ secrets.CLOUDBASE_PROD_BASE_URL }}
        run: curl -fsS "$CLOUDBASE_PROD_BASE_URL/api/v1/public/health"

      - name: Smoke test
        if: ${{ env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' && env.HAS_CLOUDBASE_PROD_BASE_URL == 'true' }}
        env:
          E2E_BASE_URL: ${{ secrets.CLOUDBASE_PROD_BASE_URL }}
          E2E_MONGODB_URI: ${{ secrets.E2E_MONGODB_URI }}
          E2E_MONGO_DB_NAME: ${{ secrets.E2E_STAGING_DB_NAME }}
          E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
          E2E_CRON_SECRET: ${{ secrets.E2E_CRON_SECRET }}
        run: uv run pytest -v -m smoke
