name: preview-manifest

# Legacy manual repair entrypoint for the retired public preview
# manifest stored in Vercel Blob (`preview/preview-urls.json`). The M8A
# CloudBase path serves `PREVIEW_MANIFEST_INLINE_JSON` first; this workflow is
# retained only for operator-driven legacy repairs while the Vercel archive
# remains available.
#
#   - workflow_dispatch → manual repair / backfill button. Same script,
#                 fully idempotent rebuild.
#
# Source of truth for both: Vercel's deployments API. See
# `server/scripts/update_preview_manifest.mjs` for the rebuild logic.
#
# Note: this workflow used to also commit `docs/preview-urls.json` back
# to `main`. That repo-tracked audit copy was removed in 2026-05 (it
# only added bot-commit churn; the runtime path was always the Blob).

on:
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read

# Serialize legacy Blob mirror rebuilds.
concurrency:
  group: preview-manifest
  cancel-in-progress: false

jobs:
  update_manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # secrets cannot appear in `if:` — evaluate once into env so steps can gate.
    env:
      HAS_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}
      HAS_BLOB_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN != '' }}
    steps:
      - name: Vercel manifest gate (why steps may be skipped)
        run: |
          set -euo pipefail
          echo "HAS_VERCEL_TOKEN=${HAS_VERCEL_TOKEN}"
          echo "HAS_BLOB_TOKEN=${HAS_BLOB_TOKEN}"
          if [ "${HAS_VERCEL_TOKEN}" != "true" ]; then
            echo "::warning::preview-manifest skipped: add repository secret VERCEL_TOKEN (Vercel → Account → Settings → Tokens) so the manifest can be rebuilt from Vercel deployments."
          fi
          if [ "${HAS_BLOB_TOKEN}" != "true" ]; then
            echo "::warning::preview-manifest skipped: add repository secret BLOB_READ_WRITE_TOKEN (Vercel project → Storage → Blob) so the rebuilt manifest can be uploaded."
          fi

      - name: Checkout
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' && env.HAS_BLOB_TOKEN == 'true' }}
        uses: actions/checkout@v5

      # `closed` events come from a PR head that may be deleted, and manual
      # dispatch has no PR ref either. We just take whatever lives on the
      # default branch (the workflow ref itself). The script no longer
      # writes to a tracked file, so there is nothing to commit.

      - name: Setup Node 24
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' && env.HAS_BLOB_TOKEN == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Octokit
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' && env.HAS_BLOB_TOKEN == 'true' }}
        run: npm install --no-save @octokit/rest

      - name: Rebuild Blob mirror from Vercel
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' && env.HAS_BLOB_TOKEN == 'true' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_REPOSITORY is auto-set by Actions to "<owner>/<repo>".
        run: node server/scripts/update_preview_manifest.mjs
