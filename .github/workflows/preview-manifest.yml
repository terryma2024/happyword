name: preview-manifest

# Cleanup-on-close + manual repair entrypoint for `docs/preview-urls.json`.
#
# The "happy path" — refreshing the manifest after a successful preview
# deployment for an OPEN PR — lives in `server-ci.yml` as the
# `update_manifest` job (gated on `server_e2e` success). This file handles
# the two cases server-ci doesn't cover:
#
#   - PR closed → rebuild the manifest. The closed PR's preview may still
#                 be alive on Vercel until the weekly prune cron deletes
#                 it, in which case it (correctly) STAYS in the manifest.
#                 If Vercel has already pruned it, the rebuild naturally
#                 drops the row. No e2e gate — the PR is closed and won't
#                 be running e2e anymore.
#   - workflow_dispatch → manual repair / backfill button. Same script,
#                 fully idempotent rebuild.
#
# Source of truth for both: Vercel's deployments API. See
# `server/scripts/update_preview_manifest.mjs` for the rebuild logic.

on:
  pull_request:
    types: [closed]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: read

# Same group name as the `update_manifest` job in server-ci.yml so the two
# workflows serialize on `docs/preview-urls.json` even when a PR closes
# during an in-flight CI run.
concurrency:
  group: preview-manifest
  cancel-in-progress: false

jobs:
  update_manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # secrets cannot appear in `if:` — evaluate once into env so steps can gate.
    env:
      HAS_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}
    steps:
      - name: Vercel manifest gate (why steps may be skipped)
        run: |
          set -euo pipefail
          echo "HAS_VERCEL_TOKEN=${HAS_VERCEL_TOKEN}"
          if [ "${HAS_VERCEL_TOKEN}" != "true" ]; then
            echo "::warning::preview-manifest skipped: add repository secret VERCEL_TOKEN (Vercel → Account → Settings → Tokens) so the manifest can be rebuilt from Vercel deployments."
          fi

      - name: Checkout main
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      # `closed` events come from a PR head that may be deleted, so we can't
      # always pull the script from the PR ref. Manual dispatch likewise has
      # no PR head. Just use whatever lives on `main`.

      - name: Setup Node 24
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Octokit
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        run: npm install --no-save @octokit/rest

      - name: Rebuild manifest from Vercel
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_REPOSITORY is auto-set by Actions to "<owner>/<repo>".
        run: node server/scripts/update_preview_manifest.mjs

      - name: Commit + push if URL set changed
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Same URL-set gate as server-ci.yml's update_manifest job — see
          # that file for the rationale. Skip the commit when the set of
          # preview URLs is identical between main's HEAD and the freshly
          # rebuilt file, even if timestamps / head_shas drifted.
          NEW_URLS=$(jq -r '(.previews // []) | map(.url) | sort[]' docs/preview-urls.json)
          OLD_URLS=$(git show HEAD:docs/preview-urls.json 2>/dev/null \
            | jq -r '(.previews // []) | map(.url) | sort[]' 2>/dev/null \
            || echo '')
          if [ "$NEW_URLS" = "$OLD_URLS" ]; then
            echo "URL set unchanged; skipping commit."
            echo "$NEW_URLS" | sed 's/^/  /'
            exit 0
          fi
          echo "URL set changed:"
          diff <(echo "$OLD_URLS") <(echo "$NEW_URLS") | sed 's/^/  /' || true
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -- docs/preview-urls.json
          if [ -n "$PR_NUMBER" ]; then
            git commit -m "chore: refresh preview-urls.json (PR #${PR_NUMBER})" -- docs/preview-urls.json
          else
            git commit -m "chore: refresh preview-urls.json (manual rebuild)" -- docs/preview-urls.json
          fi
          git push origin main
