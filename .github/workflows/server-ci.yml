name: server-ci

on:
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"

concurrency:
  group: server-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  # Until every composite action ships Node 24, opt in per GitHub deprecation notice.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  server_pytest:
    name: server / pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run pytest
        run: uv run pytest -v

  server_e2e:
    name: server / e2e (preview)
    runs-on: ubuntu-latest
    needs: server_pytest
    # secrets cannot be referenced inside `if:` (job or step). Evaluate once into env, then gate steps on env.HAS_VERCEL_TOKEN == 'true'.
    env:
      HAS_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}
    defaults:
      run:
        working-directory: server
    steps:
      # Always runs: downstream steps are gated on HAS_VERCEL_TOKEN. Without VERCEL_TOKEN
      # (or on fork PRs where secrets are unavailable), every other step is skipped and the
      # job still shows green — this step explains why.
      - name: E2E preview gate (why steps may be skipped)
        # Run from repo root: job default is `server/`, which does not exist before Checkout.
        working-directory: .
        run: |
          set -euo pipefail
          echo "HAS_VERCEL_TOKEN=${HAS_VERCEL_TOKEN}"
          if [ "${HAS_VERCEL_TOKEN}" = "true" ]; then
            echo "Vercel token is configured; E2E preview steps will run."
            exit 0
          fi
          HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          THIS_REPO="${{ github.repository }}"
          if [ "$HEAD_REPO" != "$THIS_REPO" ]; then
            echo "::warning::server / e2e (preview) skipped: secrets are not passed to workflows for pull requests from forks (head repo: ${HEAD_REPO}). Push the branch to this repository or run E2E locally."
          else
            echo "::warning::server / e2e (preview) skipped: add repository secret VERCEL_TOKEN (and Vercel org/project IDs for fallback deploy). Without it, preview URL detection / deploy cannot run."
          fi

      - name: Checkout
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        uses: actions/checkout@v5

      - name: Set up Python
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Detect Vercel preview URL from deployment status
        id: detect_preview
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request.head.sha;

            const deployments = await github.paginate(github.rest.repos.listDeployments, {
              owner,
              repo,
              sha,
              per_page: 100,
            });

            // Vercel typically creates a single "Preview" deployment per commit.
            // We walk newest-first and pick the first success status with an environment_url.
            for (const d of deployments.sort((a, b) => b.id - a.id)) {
              const statuses = await github.paginate(github.rest.repos.listDeploymentStatuses, {
                owner,
                repo,
                deployment_id: d.id,
                per_page: 100,
              });
              for (const s of statuses) {
                const url = s.environment_url || s.target_url;
                if (s.state === "success" && url) {
                  core.info(`Found preview URL: ${url}`);
                  core.setOutput("preview_url", url);
                  return;
                }
              }
            }

            core.info("No preview URL found in deployment statuses.");
            core.setOutput("preview_url", "");

      - name: Deploy Vercel preview (fallback)
        id: vercel_deploy
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' && steps.detect_preview.outputs.preview_url == '' }}
        # Run from the repo root because the Vercel project already has
        # `server` configured as its root directory.
        working-directory: .
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_META_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          VERCEL_META_COMMIT_REF: ${{ github.event.pull_request.head.ref }}
          VERCEL_META_ORG: ${{ github.repository_owner }}
          VERCEL_META_REPO: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          DEPLOY_LOG="$(mktemp)"
          npx --yes vercel@latest deploy --yes \
            --token "$VERCEL_TOKEN" \
            --meta githubCommitSha="$VERCEL_META_COMMIT_SHA" \
            --meta githubCommitRef="$VERCEL_META_COMMIT_REF" \
            --meta githubOrg="$VERCEL_META_ORG" \
            --meta githubRepo="$VERCEL_META_REPO" \
            2>&1 | tee "$DEPLOY_LOG"
          PREVIEW_URL="$(python3 - "$DEPLOY_LOG" <<'PY'
          import re
          import sys

          text = open(sys.argv[1], encoding="utf-8").read()
          urls = re.findall(r"https://[^\s\]]+", text)
          preview_urls = [url for url in urls if ".vercel.app" in url]
          if not preview_urls:
              raise SystemExit("Vercel deploy output did not include a preview URL")
          print(preview_urls[-1].rstrip("."))
          PY
          )"
          echo "preview-url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $PREVIEW_URL"

      - name: Install uv
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync dependencies
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        run: uv sync --dev

      - name: Compute preview Mongo DB name
        id: db_name
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        run: |
          # Mirror app.config's runtime expansion. Vercel preview deployments
          # for PRs expose the PR id to the function runtime; branch refs still
          # provide a deterministic fallback when that id is unavailable.
          BRANCH="${{ github.head_ref || github.ref_name }}"
          DB=$(MONGO_DB_NAME='happyword_pr_{pr}_e2e' \
            VERCEL_GIT_PULL_REQUEST_ID='${{ github.event.pull_request.number }}' \
            VERCEL_GIT_COMMIT_REF="$BRANCH" \
            uv run python -m scripts.resolve_preview_db_name)
          echo "db_name=$DB" >> "$GITHUB_OUTPUT"
          echo "Preview DB: $DB"

      - name: Reset E2E database (truncate test collections)
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        env:
          E2E_MONGODB_URI: ${{ secrets.E2E_MONGODB_URI }}
          E2E_MONGO_DB_NAME: ${{ steps.db_name.outputs.db_name }}
        run: |
          if [ -z "$E2E_MONGODB_URI" ] || [ -z "$E2E_MONGO_DB_NAME" ]; then
            echo "::warning::E2E_MONGODB_URI / E2E_MONGO_DB_NAME not configured; skipping DB reset (E2E tests requiring mongo will skip)."
            exit 0
          fi
          uv run python scripts/e2e_reset_db.py

      - name: Run E2E pytest subset
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        env:
          E2E_BASE_URL: ${{ steps.detect_preview.outputs.preview_url || steps.vercel_deploy.outputs.preview-url }}
          E2E_MONGODB_URI: ${{ secrets.E2E_MONGODB_URI }}
          E2E_MONGO_DB_NAME: ${{ steps.db_name.outputs.db_name }}
          E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
          # When the Vercel project has Deployment Protection enabled (Vercel
          # Authentication / Password / Trusted IPs), every API call from this
          # runner is intercepted with a 401 + an SSO HTML page. The driver
          # forwards this as the `x-vercel-protection-bypass` header so the
          # request is waved through to the real Function. Empty value =
          # no header is sent (safe for unprotected previews / local runs).
          # Mint the secret in: Project → Settings → Deployment Protection →
          # "Protection Bypass for Automation".
          E2E_VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        # Tee output to a log file so the cursor_autofix_e2e job can ingest it via artifact.
        run: |
          set -o pipefail
          mkdir -p artifacts
          uv run pytest -v -m e2e 2>&1 | tee artifacts/e2e-pytest.log

      - name: Upload E2E pytest log
        if: ${{ always() && env.HAS_VERCEL_TOKEN == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: e2e-pytest-log
          path: server/artifacts/e2e-pytest.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Slack alert on E2E failure
        if: ${{ failure() && env.HAS_VERCEL_TOKEN == 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_WEBHOOK_URL not configured; skipping alert."
            exit 0
          fi
          PAYLOAD=$(jq -n \
            --arg pr "${{ github.event.pull_request.number }}" \
            --arg url "${{ github.event.pull_request.html_url }}" \
            --arg sha "${{ github.event.pull_request.head.sha }}" \
            '{
              text: ("server-ci E2E FAILED on PR #" + $pr),
              blocks: [
                { type: "section", text: { type: "mrkdwn",
                  text: ("*server-ci E2E failed*\nPR #" + $pr + "\n" + $url + "\nSHA: `" + $sha + "`")
                }}
              ]
            }')
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

  update_manifest:
    name: preview-manifest / refresh
    runs-on: ubuntu-latest
    needs: server_e2e
    # Only refresh `docs/preview-urls.json` when E2E preview actually passed
    # (we don't want to advertise a broken preview on the project's landing
    # docs). Skipped + failure are both no-ops here. Restricted to in-repo PRs
    # because a fork PR cannot push back to `main`.
    if: ${{ needs.server_e2e.result == 'success' && github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: write
      pull-requests: read
    timeout-minutes: 10
    # The closed-event cleanup half of preview-manifest.yml runs in parallel
    # for some lifecycle events (e.g. a closing PR that also synchronizes).
    # Same `concurrency: preview-manifest` group as that workflow forces them
    # to serialize so we don't race on `docs/preview-urls.json`.
    concurrency:
      group: preview-manifest
      cancel-in-progress: false
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      # When the PR introduces / modifies `server/scripts/update_preview_manifest.mjs`,
      # `main` may not yet have the version we need. Pull the script from the
      # PR head ref so we always run the most recent updater logic.
      - name: Sync manifest updater from PR head
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "pull/${PR_NUMBER}/head:refs/remotes/pr-head"
          mkdir -p server/scripts
          git checkout pr-head -- server/scripts/update_preview_manifest.mjs

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install Octokit
        run: npm install --no-save @octokit/rest

      - name: Rebuild manifest from Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_REPOSITORY is auto-set by Actions to "<owner>/<repo>".
        run: node server/scripts/update_preview_manifest.mjs

      - name: Commit + push if URL set changed
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Gate the commit on the SET OF PREVIEW URLS, not the entire file.
          # The script always rewrites `updated_at` timestamps and per-row
          # `head_sha` strings on every run; if we used `git diff --staged
          # --quiet` we'd produce a noisy "refresh" commit on every PR sync
          # even when no preview deployment actually appeared or vanished.
          # Compare sorted URL lists from main's HEAD vs the freshly-written
          # file and only commit when those differ.
          NEW_URLS=$(jq -r '(.previews // []) | map(.url) | sort[]' docs/preview-urls.json)
          OLD_URLS=$(git show HEAD:docs/preview-urls.json 2>/dev/null \
            | jq -r '(.previews // []) | map(.url) | sort[]' 2>/dev/null \
            || echo '')
          if [ "$NEW_URLS" = "$OLD_URLS" ]; then
            echo "URL set unchanged; skipping commit."
            echo "$NEW_URLS" | sed 's/^/  /'
            exit 0
          fi
          echo "URL set changed:"
          diff <(echo "$OLD_URLS") <(echo "$NEW_URLS") | sed 's/^/  /' || true
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Path-specific add + commit so we can never accidentally sweep up
          # other files staged by earlier steps (notably the
          # `Sync manifest updater from PR head` step's `git checkout pr-head
          # -- server/scripts/update_preview_manifest.mjs`, which silently
          # populates the index for that path).
          git add -- docs/preview-urls.json
          if [ -n "$PR_NUMBER" ]; then
            git commit -m "chore: refresh preview-urls.json (PR #${PR_NUMBER})" -- docs/preview-urls.json
          else
            git commit -m "chore: refresh preview-urls.json" -- docs/preview-urls.json
          fi
          git push origin main

  cursor_autofix_e2e:
    name: cursor / autofix e2e (preview)
    runs-on: ubuntu-latest
    needs: server_e2e
    # Only run when E2E job actually FAILED (not when skipped because secrets are missing)
    # AND the PR is from this repo (forks have no secrets, so the autofix would no-op).
    if: ${{ always() && needs.server_e2e.result == 'failure' && github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
      pull-requests: write
    env:
      # secrets cannot appear in `if:` — evaluate once into env, then gate steps on it.
      HAS_CURSOR_KEY: ${{ secrets.CURSOR_API_KEY != '' }}
    steps:
      - name: Cursor autofix gate (why steps may be skipped)
        run: |
          set -euo pipefail
          echo "HAS_CURSOR_KEY=${HAS_CURSOR_KEY}"
          if [ "${HAS_CURSOR_KEY}" != "true" ]; then
            echo "::warning::cursor / autofix e2e (preview) skipped: add repository secret CURSOR_API_KEY (Cursor Dashboard → Cloud agents → API key) to enable automatic Cloud Agent fixes."
          fi

      - name: Checkout
        if: ${{ env.HAS_CURSOR_KEY == 'true' }}
        uses: actions/checkout@v5

      - name: Download E2E pytest log
        if: ${{ env.HAS_CURSOR_KEY == 'true' }}
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: e2e-pytest-log
          path: artifacts

      - name: Setup Node.js
        if: ${{ env.HAS_CURSOR_KEY == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install @cursor/sdk
        if: ${{ env.HAS_CURSOR_KEY == 'true' }}
        # Install at the workspace root so Node's ESM resolver — which walks up
        # from the .mjs file (cwd is ignored for ESM) — finds node_modules/@cursor/sdk
        # at $GITHUB_WORKSPACE. Use --prefix to avoid altering any committed package.json.
        run: |
          set -euo pipefail
          if [ ! -f package.json ]; then
            # Minimal package.json — never committed; only lives on the runner.
            cat > package.json <<'JSON'
          {
            "name": "happyword-cursor-autofix-runner",
            "version": "0.0.0",
            "private": true
          }
          JSON
          fi
          npm install --silent --no-audit --no-fund --no-progress --no-save @cursor/sdk

      - name: Trigger Cursor Cloud autofix
        if: ${{ env.HAS_CURSOR_KEY == 'true' }}
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REPO_URL: ${{ github.event.repository.clone_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          E2E_LOG_FILE: artifacts/e2e-pytest.log
        run: node .github/scripts/trigger-cursor-fix-e2e.mjs
