name: server-ci

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"

concurrency:
  group: server-ci-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  # Until every composite action ships Node 24, opt in per GitHub deprecation notice.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # 53.3.0 depends on unpublished @vercel/cli-config@0.1.0, so keep CI on
  # the newest installable CLI until the npm release is fixed upstream.
  VERCEL_CLI_VERSION: "53.2.0"

jobs:
  server_pytest:
    name: server / pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run pytest
        run: uv run pytest -v

      - name: Package server source for CloudBase E2E
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' ||
            github.event_name == 'pull_request'
          }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: server-source-for-cloudbase-e2e
          path: |
            server
            !server/.venv
            !server/.pytest_cache
            !server/artifacts
          if-no-files-found: error
          retention-days: 1

  server_e2e:
    name: server / e2e (legacy Vercel preview)
    runs-on: ubuntu-latest
    needs: server_pytest
    if: ${{ github.event_name == 'pull_request' }}
    env:
      HAS_VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' }}
    defaults:
      run:
        working-directory: server
    steps:
      - name: E2E preview gate (why steps may be skipped)
        working-directory: .
        run: |
          set -euo pipefail
          echo "HAS_VERCEL_TOKEN=${HAS_VERCEL_TOKEN}"
          if [ "${HAS_VERCEL_TOKEN}" = "true" ]; then
            echo "Vercel token is configured; legacy Vercel Preview E2E will run during the CloudBase transition."
            exit 0
          fi
          HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          THIS_REPO="${{ github.repository }}"
          if [ "$HEAD_REPO" != "$THIS_REPO" ]; then
            echo "::warning::server / e2e (legacy Vercel preview) skipped: secrets are not passed to workflows for pull requests from forks (head repo: ${HEAD_REPO})."
          else
            echo "::warning::server / e2e (legacy Vercel preview) skipped: add VERCEL_TOKEN and Vercel org/project secrets."
          fi

      - name: Checkout
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Detect Vercel preview URL from deployment status
        id: detect_preview
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request.head.sha;

            const deployments = await github.paginate(github.rest.repos.listDeployments, {
              owner,
              repo,
              sha,
              per_page: 100,
            });

            for (const d of deployments.sort((a, b) => b.id - a.id)) {
              const statuses = await github.paginate(github.rest.repos.listDeploymentStatuses, {
                owner,
                repo,
                deployment_id: d.id,
                per_page: 100,
              });
              for (const s of statuses) {
                const url = s.environment_url || s.target_url;
                if (s.state === "success" && url) {
                  core.info(`Found preview URL: ${url}`);
                  core.setOutput("preview_url", url);
                  return;
                }
              }
            }

            core.info("No preview URL found in deployment statuses.");
            core.setOutput("preview_url", "");

      - name: Deploy Vercel preview (E2E-controlled)
        id: vercel_deploy
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        working-directory: .
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_META_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          VERCEL_META_COMMIT_REF: ${{ github.event.pull_request.head.ref }}
          VERCEL_META_ORG: ${{ github.repository_owner }}
          VERCEL_META_REPO: ${{ github.event.repository.name }}
          HAPPYWORD_PREVIEW_PR_ID: ${{ github.event.pull_request.number }}
          ADMIN_BOOTSTRAP_USER: ${{ secrets.E2E_ADMIN_USER }}
          ADMIN_BOOTSTRAP_PASS: ${{ secrets.E2E_ADMIN_PASS }}
        run: |
          set -euo pipefail
          DEPLOY_LOG="$(mktemp)"
          npx --yes "vercel@${VERCEL_CLI_VERSION}" deploy --yes \
            --token "$VERCEL_TOKEN" \
            --meta githubCommitSha="$VERCEL_META_COMMIT_SHA" \
            --meta githubCommitRef="$VERCEL_META_COMMIT_REF" \
            --meta githubOrg="$VERCEL_META_ORG" \
            --meta githubRepo="$VERCEL_META_REPO" \
            --env HAPPYWORD_PREVIEW_PR_ID="$HAPPYWORD_PREVIEW_PR_ID" \
            --env HAPPYWORD_PREVIEW_BRANCH="$VERCEL_META_COMMIT_REF" \
            --env ADMIN_BOOTSTRAP_USER="$ADMIN_BOOTSTRAP_USER" \
            --env ADMIN_BOOTSTRAP_PASS="$ADMIN_BOOTSTRAP_PASS" \
            2>&1 | tee "$DEPLOY_LOG"
          PREVIEW_URL="$(python3 - "$DEPLOY_LOG" <<'PY'
          import re
          import sys

          text = open(sys.argv[1], encoding="utf-8").read()
          urls = re.findall(r"https://[^\s\]]+", text)
          preview_urls = [url for url in urls if ".vercel.app" in url]
          if not preview_urls:
              raise SystemExit("Vercel deploy output did not include a preview URL")
          print(preview_urls[-1].rstrip("."))
          PY
          )"
          echo "preview-url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $PREVIEW_URL"

      - name: Install uv
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync dependencies
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        run: uv sync --dev

      - name: Compute preview Mongo DB name
        id: db_name
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          DB=$(MONGO_DB_NAME='happyword_pr_{pr}_e2e' \
            VERCEL_GIT_PULL_REQUEST_ID='${{ github.event.pull_request.number }}' \
            VERCEL_GIT_COMMIT_REF="$BRANCH" \
            uv run python -m scripts.resolve_preview_db_name)
          echo "db_name=$DB" >> "$GITHUB_OUTPUT"
          echo "Preview DB: $DB"

      - name: Validate E2E MongoDB URI
        id: e2e_mongo
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' }}
        env:
          E2E_MONGODB_URI: ${{ secrets.E2E_MONGODB_URI }}
        run: |
          python3 - <<'PY'
          import os
          from urllib.parse import urlparse

          def set_ready(value: bool) -> None:
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                  fh.write(f"ready={'true' if value else 'false'}\n")

          uri = os.environ.get("E2E_MONGODB_URI", "").strip()
          if not uri:
              print("::warning::E2E_MONGODB_URI not configured; skipping legacy Vercel E2E.")
              set_ready(False)
              raise SystemExit(0)

          netloc = urlparse(uri).netloc.rsplit("@", 1)[-1]
          hosts = []
          for entry in netloc.split(","):
              entry = entry.strip()
              if not entry:
                  continue
              if entry.startswith("["):
                  host = entry[1:].split("]", 1)[0]
              else:
                  host = entry.split(":", 1)[0]
              hosts.append(host.lower())

          if not hosts:
              print("::warning::Could not parse E2E_MONGODB_URI host; skipping legacy Vercel E2E.")
              set_ready(False)
              raise SystemExit(0)

          local_hosts = {"localhost", "127.0.0.1", "::1", "0.0.0.0"}
          if all(host in local_hosts or host.startswith("127.") for host in hosts):
              print(
                  "::warning::E2E_MONGODB_URI points at a local MongoDB host "
                  f"({', '.join(hosts)}); skipping legacy Vercel E2E on GitHub runner."
              )
              set_ready(False)
              raise SystemExit(0)

          set_ready(True)
          PY

      - name: Prune stale E2E PR databases
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' && steps.e2e_mongo.outputs.ready == 'true' }}
        env:
          E2E_MONGODB_URI: ${{ secrets.E2E_MONGODB_URI }}
          E2E_MONGO_DB_NAME: ${{ steps.db_name.outputs.db_name }}
        run: |
          if [ -z "$E2E_MONGODB_URI" ] || [ -z "$E2E_MONGO_DB_NAME" ]; then
            echo "::warning::E2E_MONGODB_URI / E2E_MONGO_DB_NAME not configured; skipping stale PR DB cleanup."
            exit 0
          fi
          uv run python scripts/e2e_drop_old_pr_dbs.py \
            --pattern '^happyword_pr_\d+_e2e$' \
            --older-than-days 2 \
            --drop-empty \
            --drop-collections-on-drop-error \
            --exclude "$E2E_MONGO_DB_NAME" \
            --ignore-drop-errors

      - name: Reset E2E database (truncate test collections)
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' && steps.e2e_mongo.outputs.ready == 'true' }}
        env:
          E2E_MONGODB_URI: ${{ secrets.E2E_MONGODB_URI }}
          E2E_MONGO_DB_NAME: ${{ steps.db_name.outputs.db_name }}
        run: |
          if [ -z "$E2E_MONGODB_URI" ] || [ -z "$E2E_MONGO_DB_NAME" ]; then
            echo "::warning::E2E_MONGODB_URI / E2E_MONGO_DB_NAME not configured; skipping DB reset."
            exit 0
          fi
          uv run python scripts/e2e_reset_db.py

      - name: Run E2E pytest subset
        if: ${{ env.HAS_VERCEL_TOKEN == 'true' && steps.e2e_mongo.outputs.ready == 'true' }}
        env:
          E2E_BASE_URL: ${{ steps.vercel_deploy.outputs.preview-url || steps.detect_preview.outputs.preview_url }}
          E2E_MONGODB_URI: ${{ secrets.E2E_MONGODB_URI }}
          E2E_MONGO_DB_NAME: ${{ steps.db_name.outputs.db_name }}
          E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
          E2E_CRON_SECRET: ${{ secrets.E2E_CRON_SECRET }}
          E2E_VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -o pipefail
          mkdir -p artifacts
          uv run pytest -v -m e2e 2>&1 | tee artifacts/e2e-pytest.log

      - name: Upload E2E pytest log
        if: ${{ always() && env.HAS_VERCEL_TOKEN == 'true' }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: e2e-pytest-log
          path: server/artifacts/e2e-pytest.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Slack alert on E2E failure
        if: ${{ failure() && env.HAS_VERCEL_TOKEN == 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_WEBHOOK_URL not configured; skipping alert."
            exit 0
          fi
          PAYLOAD=$(jq -n \
            --arg pr "${{ github.event.pull_request.number }}" \
            --arg url "${{ github.event.pull_request.html_url }}" \
            --arg sha "${{ github.event.pull_request.head.sha }}" \
            '{
              text: ("server-ci legacy Vercel E2E FAILED on PR #" + $pr),
              blocks: [
                { type: "section", text: { type: "mrkdwn",
                  text: ("*server-ci legacy Vercel E2E failed*\nPR #" + $pr + "\n" + $url + "\nSHA: `" + $sha + "`")
                }}
              ]
            }')
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

  update_manifest:
    name: preview-manifest / legacy Vercel refresh
    runs-on: ubuntu-latest
    needs: server_e2e
    if: ${{ github.event_name == 'pull_request' && needs.server_e2e.result == 'success' && github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 10
    concurrency:
      group: preview-manifest
      cancel-in-progress: false
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install Octokit
        run: npm install --no-save @octokit/rest

      - name: Rebuild Blob mirror from Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node server/scripts/update_preview_manifest.mjs

  cloudbase_staging_e2e:
    name: server / cloudbase staging e2e
    runs-on: [self-hosted, linux, x64, happyword-e2e-db]
    needs: server_pytest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'pull_request'
      }}
    concurrency:
      group: cloudbase-staging-e2e
      cancel-in-progress: false
    env:
      HAS_CLOUDBASE_STAGING_BASE_URL: ${{ secrets.CLOUDBASE_STAGING_BASE_URL != '' }}
      HAS_E2E_MONGODB_URI: ${{ secrets.E2E_MONGODB_URI != '' }}
      HAS_E2E_STAGING_DB_NAME: ${{ secrets.E2E_STAGING_DB_NAME != '' }}
      HAS_TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID != '' }}
      HAS_TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY != '' }}
      HAS_TCB_ENV_ID: ${{ secrets.TCB_ENV_ID != '' }}
      UV_BIN: /usr/local/bin/uv
      NODE_VERSION: 24.11.1
      NPM_CONFIG_PREFIX: /tmp/happyword-npm-global
    defaults:
      run:
        working-directory: server
    steps:
      - name: CloudBase staging E2E gate
        working-directory: .
        run: |
          set -euo pipefail
          echo "HAS_CLOUDBASE_STAGING_BASE_URL=${HAS_CLOUDBASE_STAGING_BASE_URL}"
          echo "HAS_E2E_MONGODB_URI=${HAS_E2E_MONGODB_URI}"
          echo "HAS_E2E_STAGING_DB_NAME=${HAS_E2E_STAGING_DB_NAME}"
          echo "HAS_TCB_SECRET_ID=${HAS_TCB_SECRET_ID}"
          echo "HAS_TCB_SECRET_KEY=${HAS_TCB_SECRET_KEY}"
          echo "HAS_TCB_ENV_ID=${HAS_TCB_ENV_ID}"
          if [ "${HAS_CLOUDBASE_STAGING_BASE_URL}" != "true" ] || \
             [ "${HAS_E2E_MONGODB_URI}" != "true" ] || \
             [ "${HAS_E2E_STAGING_DB_NAME}" != "true" ] || \
             [ "${HAS_TCB_SECRET_ID}" != "true" ] || \
             [ "${HAS_TCB_SECRET_KEY}" != "true" ] || \
             [ "${HAS_TCB_ENV_ID}" != "true" ]; then
            echo "::warning::cloudbase staging E2E skipped: configure CLOUDBASE_STAGING_BASE_URL, E2E_MONGODB_URI, E2E_STAGING_DB_NAME, TCB_SECRET_ID, TCB_SECRET_KEY, and TCB_ENV_ID."
          fi

      - name: Download server source
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' && env.HAS_E2E_MONGODB_URI == 'true' && env.HAS_E2E_STAGING_DB_NAME == 'true' && env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' }}
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf server
          mkdir -p server
          curl -fsS \
            --retry 5 \
            --connect-timeout 20 \
            --max-time 120 \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts" \
            > /tmp/server-ci-artifacts.json
          archive_url="$(
            jq -r '.artifacts[] | select(.name == "server-source-for-cloudbase-e2e") | .archive_download_url' \
              /tmp/server-ci-artifacts.json \
              | head -n 1
          )"
          if [ -z "${archive_url}" ] || [ "${archive_url}" = "null" ]; then
            echo "::error::server-source-for-cloudbase-e2e artifact was not found for run ${GITHUB_RUN_ID}."
            exit 1
          fi
          curl -fL \
            --retry 5 \
            --connect-timeout 20 \
            --max-time 300 \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${archive_url}" \
            -o /tmp/server-source-for-cloudbase-e2e.zip
          python3.12 -m zipfile -e /tmp/server-source-for-cloudbase-e2e.zip server

      - name: Bootstrap Node.js
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' && env.HAS_E2E_MONGODB_URI == 'true' && env.HAS_E2E_STAGING_DB_NAME == 'true' && env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p "$NPM_CONFIG_PREFIX/bin"
          echo "$NPM_CONFIG_PREFIX/bin" >> "$GITHUB_PATH"
          export PATH="$NPM_CONFIG_PREFIX/bin:$PATH"

          if ! command -v node >/dev/null 2>&1 || ! command -v npm >/dev/null 2>&1; then
            runner_root="$(cd "$RUNNER_TEMP/../.." && pwd)"
            for node_bin_dir in "$runner_root"/externals/node*/bin; do
              if [ -x "$node_bin_dir/node" ]; then
                echo "$node_bin_dir" >> "$GITHUB_PATH"
                export PATH="$node_bin_dir:$PATH"
                break
              fi
            done
          fi

          if ! command -v node >/dev/null 2>&1 || ! command -v npm >/dev/null 2>&1; then
            node_archive="node-v${NODE_VERSION}-linux-x64.tar.xz"
            node_dir="/tmp/node-v${NODE_VERSION}-linux-x64"
            if [ ! -x "$node_dir/bin/node" ] || [ ! -x "$node_dir/bin/npm" ]; then
              curl -fsSL \
                --retry 5 \
                --connect-timeout 20 \
                --max-time 300 \
                "https://nodejs.org/dist/v${NODE_VERSION}/${node_archive}" \
                -o "/tmp/${node_archive}"
              tar -xJf "/tmp/${node_archive}" -C /tmp
            fi
            echo "$node_dir/bin" >> "$GITHUB_PATH"
            export PATH="$node_dir/bin:$PATH"
          fi

          node --version
          npm --version

      - name: Verify runner toolchain
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' && env.HAS_E2E_MONGODB_URI == 'true' && env.HAS_E2E_STAGING_DB_NAME == 'true' && env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' }}
        run: |
          python3.12 --version
          jq --version
          node --version
          npm --version
          "$UV_BIN" --version

      - name: Install CloudBase CLI
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' && env.HAS_E2E_MONGODB_URI == 'true' && env.HAS_E2E_STAGING_DB_NAME == 'true' && env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' }}
        run: npm install -g @cloudbase/cli

      - name: Login to CloudBase for staging deploy
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' && env.HAS_E2E_MONGODB_URI == 'true' && env.HAS_E2E_STAGING_DB_NAME == 'true' && env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' }}
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"

      - name: Capture CloudBase staging deploy marker
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' && env.HAS_E2E_MONGODB_URI == 'true' && env.HAS_E2E_STAGING_DB_NAME == 'true' && env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' }}
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          set -euo pipefail
          tcb api tcbr DescribeCloudRunDeployRecord \
            --api-version 2022-02-17 \
            -e "$TCB_ENV_ID" \
            --body "{\"EnvId\":\"$TCB_ENV_ID\",\"ServerName\":\"happyword-server-staging\"}" \
            --json > /tmp/cloudbase-staging-deploy-record-before.json
          node <<'NODE' >> "$GITHUB_ENV"
          const fs = require("node:fs");

          const raw = fs.readFileSync("/tmp/cloudbase-staging-deploy-record-before.json", "utf8");
          const jsonStart = raw.indexOf("{");
          const payload = JSON.parse(jsonStart >= 0 ? raw.slice(jsonStart) : raw);
          const records = payload.data?.DeployRecords ?? [];
          const latest = records[records.length - 1];
          console.log(`CLOUDBASE_PREVIOUS_STAGING_DEPLOY_ID=${latest?.DeployId ?? ""}`);
          NODE

      - name: Deploy CloudBase staging Run
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' && env.HAS_E2E_MONGODB_URI == 'true' && env.HAS_E2E_STAGING_DB_NAME == 'true' && env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' }}
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          set -euo pipefail
          printf '\n' | tcb cloudrun deploy -e "$TCB_ENV_ID" -s happyword-server-staging --port 8080 --source . --force

      - name: Wait for CloudBase staging deployment
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' && env.HAS_E2E_MONGODB_URI == 'true' && env.HAS_E2E_STAGING_DB_NAME == 'true' && env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' }}
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const { execFileSync } = require("node:child_process");

          const envId = process.env.TCB_ENV_ID;
          const previousDeployId = process.env.CLOUDBASE_PREVIOUS_STAGING_DEPLOY_ID ?? "";
          const serverName = "happyword-server-staging";
          const deadline = Date.now() + 10 * 60 * 1000;

          function sleep(ms) {
            Atomics.wait(new Int32Array(new SharedArrayBuffer(4)), 0, 0, ms);
          }

          function latestDeployRecord() {
            const raw = execFileSync(
              "tcb",
              [
                "api",
                "tcbr",
                "DescribeCloudRunDeployRecord",
                "--api-version",
                "2022-02-17",
                "-e",
                envId,
                "--body",
                JSON.stringify({ EnvId: envId, ServerName: serverName }),
                "--json",
              ],
              { encoding: "utf8" },
            );
            const jsonStart = raw.indexOf("{");
            const payload = JSON.parse(jsonStart >= 0 ? raw.slice(jsonStart) : raw);
            const records = payload.data?.DeployRecords ?? [];
            return records[records.length - 1];
          }

          while (Date.now() < deadline) {
            const latest = latestDeployRecord();
            if (!latest) {
              throw new Error("CloudBase staging deploy record list is empty");
            }
            console.log(
              [
                `deploy=${latest.DeployId}`,
                `status=${latest.Status}`,
                `build=${latest.BuildId}`,
                `traffic=${latest.FlowRatio}`,
                `hasTraffic=${latest.HasTraffic}`,
              ].join(" "),
            );
            if (latest.DeployId !== previousDeployId && latest.Status === "deploy_failed") {
              throw new Error(`CloudBase staging deploy ${latest.DeployId} failed`);
            }
            if (
              latest.DeployId !== previousDeployId &&
              latest.Status === "normal" &&
              Number(latest.BuildId) > 0 &&
              String(latest.FlowRatio) === "100" &&
              latest.HasTraffic === true
            ) {
              process.exit(0);
            }
            sleep(15000);
          }

          throw new Error("Timed out waiting for a new CloudBase staging deploy to receive 100% traffic");
          NODE

      - name: Health check CloudBase staging
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' && env.HAS_E2E_MONGODB_URI == 'true' && env.HAS_E2E_STAGING_DB_NAME == 'true' && env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' }}
        env:
          CLOUDBASE_STAGING_BASE_URL: ${{ secrets.CLOUDBASE_STAGING_BASE_URL }}
        run: curl -fsS "$CLOUDBASE_STAGING_BASE_URL/api/v1/public/health"

      - name: Sync dependencies
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' && env.HAS_E2E_MONGODB_URI == 'true' && env.HAS_E2E_STAGING_DB_NAME == 'true' && env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' }}
        run: |
          "$UV_BIN" sync --python 3.12 --dev --default-index https://mirrors.cloud.tencent.com/pypi/simple

      - name: Reset shared staging E2E database
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' && env.HAS_E2E_MONGODB_URI == 'true' && env.HAS_E2E_STAGING_DB_NAME == 'true' && env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' }}
        env:
          E2E_MONGODB_URI: ${{ secrets.E2E_MONGODB_URI }}
          E2E_MONGO_DB_NAME: ${{ secrets.E2E_STAGING_DB_NAME }}
          E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
        run: |
          "$UV_BIN" run --python 3.12 python scripts/e2e_reset_db.py

      - name: Run CloudBase staging E2E
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' && env.HAS_E2E_MONGODB_URI == 'true' && env.HAS_E2E_STAGING_DB_NAME == 'true' && env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' }}
        env:
          E2E_BASE_URL: ${{ secrets.CLOUDBASE_STAGING_BASE_URL }}
          E2E_MONGODB_URI: ${{ secrets.E2E_MONGODB_URI }}
          E2E_MONGO_DB_NAME: ${{ secrets.E2E_STAGING_DB_NAME }}
          E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
          E2E_CRON_SECRET: ${{ secrets.E2E_CRON_SECRET }}
        run: |
          set -o pipefail
          mkdir -p artifacts
          "$UV_BIN" run --python 3.12 pytest -v -m e2e 2>&1 | tee artifacts/e2e-pytest.log

      - name: Slack alert on E2E failure
        if: ${{ failure() && env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' && env.HAS_E2E_MONGODB_URI == 'true' && env.HAS_E2E_STAGING_DB_NAME == 'true' && env.HAS_TCB_SECRET_ID == 'true' && env.HAS_TCB_SECRET_KEY == 'true' && env.HAS_TCB_ENV_ID == 'true' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "::warning::SLACK_WEBHOOK_URL not configured; skipping alert."
            exit 0
          fi
          PAYLOAD=$(jq -n \
            --arg pr "${{ github.event.pull_request.number || 'manual' }}" \
            --arg url "${{ github.event.pull_request.html_url || github.server_url }}" \
            --arg sha "${{ github.event.pull_request.head.sha || github.sha }}" \
            '{
              text: ("server-ci CloudBase staging E2E FAILED on " + $pr),
              blocks: [
                { type: "section", text: { type: "mrkdwn",
                  text: ("*server-ci CloudBase staging E2E failed*\nRun: " + $pr + "\n" + $url + "\nSHA: `" + $sha + "`")
                }}
              ]
            }')
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
