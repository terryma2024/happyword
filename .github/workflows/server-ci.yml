name: server-ci

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    paths:
      - "server/**"
      - ".github/workflows/server-ci.yml"

concurrency:
  group: server-ci-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  # Until every composite action ships Node 24, opt in per GitHub deprecation notice.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  server_pytest:
    name: server / pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run pytest
        run: uv run pytest -v

  cloudbase_staging_smoke:
    name: server / cloudbase staging smoke
    runs-on: ubuntu-latest
    needs: server_pytest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request' &&
          (
            github.event.action == 'labeled' ||
            contains(github.event.pull_request.labels.*.name, 'cloudbase-smoke')
          ) &&
          contains(github.event.pull_request.labels.*.name, 'cloudbase-smoke')
        )
      }}
    env:
      HAS_CLOUDBASE_STAGING_BASE_URL: ${{ secrets.CLOUDBASE_STAGING_BASE_URL != '' }}
      HAS_E2E_MONGODB_URI: ${{ secrets.E2E_MONGODB_URI != '' }}
      HAS_E2E_STAGING_DB_NAME: ${{ secrets.E2E_STAGING_DB_NAME != '' }}
    defaults:
      run:
        working-directory: server
    steps:
      - name: CloudBase staging smoke gate
        working-directory: .
        run: |
          set -euo pipefail
          echo "HAS_CLOUDBASE_STAGING_BASE_URL=${HAS_CLOUDBASE_STAGING_BASE_URL}"
          echo "HAS_E2E_MONGODB_URI=${HAS_E2E_MONGODB_URI}"
          echo "HAS_E2E_STAGING_DB_NAME=${HAS_E2E_STAGING_DB_NAME}"
          if [ "${HAS_CLOUDBASE_STAGING_BASE_URL}" != "true" ]; then
            echo "::warning::cloudbase staging smoke skipped: add CLOUDBASE_STAGING_BASE_URL or run against staging locally."
          fi

      - name: Checkout
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' }}
        uses: actions/checkout@v5

      - name: Set up Python
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' }}
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync dependencies
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' }}
        run: uv sync --dev

      - name: Run CloudBase staging smoke
        if: ${{ env.HAS_CLOUDBASE_STAGING_BASE_URL == 'true' }}
        env:
          E2E_BASE_URL: ${{ secrets.CLOUDBASE_STAGING_BASE_URL }}
          E2E_MONGODB_URI: ${{ secrets.E2E_MONGODB_URI }}
          E2E_MONGO_DB_NAME: ${{ secrets.E2E_STAGING_DB_NAME }}
          E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
          E2E_CRON_SECRET: ${{ secrets.E2E_CRON_SECRET }}
        run: |
          set -o pipefail
          uv run pytest -v -m smoke
