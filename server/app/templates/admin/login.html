<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/static/favicon.png" />
  <title>管理员登录 · 快乐背单词</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center px-4">
  <section class="w-full max-w-md bg-white border border-slate-200 rounded-lg shadow-sm p-8 space-y-6">
    <header>
      <h1 class="text-xl font-semibold text-slate-900">系统管理员</h1>
      <p class="text-sm text-slate-500 mt-1">请使用管理员账号登录。</p>
    </header>
    {% if error %}
    <p class="text-sm text-red-600 bg-red-50 border border-red-100 rounded-md px-3 py-2">{{ error }}</p>
    {% endif %}
    <form method="post" action="/admin/login" class="space-y-4">
      <div>
        <label for="username" class="block text-sm font-medium text-slate-700">用户名</label>
        <input id="username" name="username" type="text" autocomplete="username" required
               class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-sky-500 focus:ring-sky-500" />
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-slate-700">密码</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required
               class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-sky-500 focus:ring-sky-500" />
      </div>
      <button type="submit"
              class="w-full rounded-md bg-sky-600 hover:bg-sky-700 text-white text-sm font-medium py-2.5">
        登录
      </button>
    </form>
  </section>
</body>
</html>
