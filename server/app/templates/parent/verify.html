{% extends "_base.html" %}
{% block title %}验证邮箱{% endblock %}
{% block content %}
<section class="bg-white rounded-lg shadow-sm border border-slate-200 p-6 max-w-md mx-auto">
  <h1 class="text-2xl font-semibold text-slate-900 mb-2">输入验证码</h1>
  <p class="text-sm text-slate-600 mb-6">
    我们已向 <span class="font-medium text-slate-900">{{ email }}</span> 发送了一个 6 位验证码，
    有效期 10 分钟。
  </p>
  {% if error %}
  <div class="mb-4 px-3 py-2 bg-rose-50 border border-rose-200 text-rose-800 rounded-md text-sm">
    {{ error }}
  </div>
  {% endif %}
  <form method="post" action="/parent/auth/verify-code" class="space-y-4">
    <input type="hidden" name="email" value="{{ email }}" />
    <label class="block">
      <span class="block text-sm font-medium text-slate-700 mb-1">验证码</span>
      <input type="text" name="code" required inputmode="numeric" pattern="\d{6}"
             maxlength="6" autocomplete="one-time-code"
             class="w-full px-3 py-2 text-2xl tracking-widest text-center border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
             placeholder="000000" />
    </label>
    <button type="submit"
            class="w-full bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700 transition">
      验证并登录
    </button>
  </form>
  <form method="post" action="/parent/auth/request-code" class="mt-4">
    <input type="hidden" name="email" value="{{ email }}" />
    <button type="submit" class="text-sm text-slate-500 hover:text-slate-900">
      重新发送验证码
    </button>
  </form>
  <p class="text-xs text-slate-400 mt-6">
    如果未在收件箱看到邮件，请检查垃圾邮件文件夹。
  </p>
</section>
{% endblock %}
