{% extends "_base.html" %}
{% block title %}创建账号{% endblock %}
{% block content %}
<section class="bg-white rounded-lg shadow-sm border border-slate-200 p-6 max-w-md mx-auto">
  <h1 class="text-2xl font-semibold text-slate-900 mb-2">邮箱尚未注册</h1>
  <p class="text-sm text-slate-600 mb-6">
    邮箱 <strong>{{ email }}</strong> 尚未注册家长账号。
    是否创建新账号？我们会向该邮箱发送 6 位验证码以确认是你本人。
  </p>
  <div class="flex flex-col sm:flex-row gap-3">
    <a href="/family/login"
       class="flex-1 text-center border border-slate-300 text-slate-700 py-2 rounded-md hover:bg-slate-50 transition text-sm font-medium">
      取消
    </a>
    <form method="post" action="/family/_/auth/request-code" class="flex-1">
      <input type="hidden" name="email" value="{{ email }}" />
      <button type="submit"
              class="w-full bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700 transition text-sm font-medium">
        创建账号并接收验证码
      </button>
    </form>
  </div>
</section>
{% endblock %}
