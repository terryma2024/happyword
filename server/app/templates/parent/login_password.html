{% extends "_base.html" %}
{% block title %}密码登录{% endblock %}
{% block content %}
<section class="bg-white rounded-lg shadow-sm border border-slate-200 p-6 max-w-md mx-auto">
  <p class="mb-4">
    <a href="/family/login" class="text-sm text-slate-500 hover:text-slate-700">← 返回登录</a>
  </p>
  <h1 class="text-2xl font-semibold text-slate-900 mb-2">密码登录</h1>
  <p class="text-sm text-slate-600 mb-6">使用已绑定邮箱的账号和密码登录家长后台。</p>
  <form method="post" action="/family/_/auth/password-login" class="space-y-4">
    <label class="block">
      <span class="block text-sm font-medium text-slate-700 mb-1">邮箱地址</span>
      <input type="email" name="email" required autocomplete="email"
             value="{{ password_email or '' }}"
             class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
             placeholder="parent@example.com" />
    </label>
    <label class="block">
      <span class="block text-sm font-medium text-slate-700 mb-1">密码</span>
      <input type="password" name="password" required autocomplete="current-password"
             class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
             placeholder="至少 8 个字符" />
    </label>
    {% if password_error %}
    <p class="text-sm text-red-600" role="alert">{{ password_error }}</p>
    {% endif %}
    <button type="submit"
            class="w-full bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700 transition font-medium">
      登录
    </button>
  </form>
  <p class="text-xs text-slate-400 mt-4">
    尚未设置密码？请先在
    <a href="/family/login" class="text-indigo-600 hover:text-indigo-800">登录页</a>
    使用邮箱验证码或第三方账号登录，然后在账号设置中设置密码。
  </p>
</section>
{% endblock %}
