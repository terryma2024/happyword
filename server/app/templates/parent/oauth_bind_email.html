{% extends "_base.html" %}
{% block title %}绑定邮箱{% endblock %}
{% block content %}
<section class="bg-white rounded-lg shadow-sm border border-slate-200 p-6 max-w-md mx-auto">
  <h1 class="text-2xl font-semibold text-slate-900 mb-2">绑定邮箱</h1>
  <p class="text-sm text-slate-600 mb-6">首次使用第三方登录时，需要用邮箱验证码绑定家长账号。</p>

  <form method="post" action="/family/oauth/bind-email/request-code" class="space-y-4">
    <input type="hidden" name="ticket" value="{{ ticket }}" />
    <label class="block">
      <span class="block text-sm font-medium text-slate-700 mb-1">邮箱地址</span>
      <input type="email" name="email" required autocomplete="email" value="{{ email }}"
             class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
             placeholder="parent@example.com" />
    </label>
    <button type="submit"
            class="w-full bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700 transition">
      发送验证码
    </button>
  </form>

  {% if sent %}
  <form method="post" action="/family/oauth/bind-email/verify-code" class="space-y-4 mt-6">
    <input type="hidden" name="ticket" value="{{ ticket }}" />
    <input type="hidden" name="email" value="{{ email }}" />
    <label class="block">
      <span class="block text-sm font-medium text-slate-700 mb-1">验证码</span>
      <input type="text" name="code" required inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
             class="w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"
             placeholder="123456" />
    </label>
    <button type="submit"
            class="w-full bg-slate-900 text-white py-2 rounded-md hover:bg-slate-800 transition">
      完成绑定并登录
    </button>
  </form>
  {% endif %}

  {% if error %}
  <p class="text-sm text-red-600 mt-4" role="alert">{{ error }}</p>
  {% endif %}
</section>
{% endblock %}
