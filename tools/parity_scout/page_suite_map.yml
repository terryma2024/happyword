# parity_scout registry — page <-> per-platform capture route alignment.
# Source of truth for the gap-scout tool. See:
#   docs/superpowers/specs/2026-05-13-parity-scout-design.md §4.3
#
# Schema rules enforced at load time (parity_scout/registry.py):
#   present: false                  -> platform is FEATURE_ABSENT (skip capture)
#   present: true && capture: null  -> platform is BLOCKED (refuse to run leaf)
#   present: true && capture.kind in {capture_harmony_step, simctl_route,
#       android_screenshot_test} -> platform is OK
#
# When adding a page, also keep the `page_source` paths in sync with the
# closest existing source file on each platform. tests/test_registry.py's
# real-registry pass warns when a `page_source` no longer exists.

pages:
  - id: home
    description: Landing screen (landscape, child-facing)
    spec_anchors:
      stable_ids: [HomeStartButton, HomeChildProfileButton, HomeVersionLabel]
      page_section_titles: [Home, "主页"]
    harmony:
      present: true
      page_source: harmonyos/entry/src/main/ets/pages/HomePage.ets
      capture: { kind: capture_harmony_step, step: home }
    ios:
      present: true
      page_source: ios/WordMagicGame/Features/CoreLoop/HomeView.swift
      capture:
        kind: simctl_route
        launch_args: ["-UITestResetState"]
        output_basename: home
    android:
      present: true
      page_source: android/app/src/main/java/cool/happyword/wordmagic/ui/LocalGrowthScreens.kt
      capture:
        kind: android_screenshot_test
        test_method: captureGrowthAndCloudScreens
        filename: local-growth-home.png

  - id: battle
    description: Battle page (landscape)
    spec_anchors:
      stable_ids: [BattleCorrectOption, BattleFinishButton]
      page_section_titles: [Battle]
    harmony:
      present: true
      page_source: harmonyos/entry/src/main/ets/pages/BattlePage.ets
      capture: { kind: capture_harmony_step, step: battle+result }
    ios:
      present: true
      page_source: ios/WordMagicGame/Features/CoreLoop/BattleView.swift
      capture:
        kind: simctl_route
        launch_args: ["-UITestResetState", "-UITestRouteBattle"]
        output_basename: battle
    android:
      # No standalone "battle" screenshot test method today; covered indirectly
      # by captureResultScreen which lands on Result after one tap. Treat as
      # BLOCKED until a per-page route exists, so the SKILL surfaces it.
      present: true
      page_source: android/app/src/main/java/cool/happyword/wordmagic/ui/LocalGrowthScreens.kt
      capture: null

  - id: result
    description: Battle result (landscape)
    spec_anchors:
      stable_ids: [ResultHomeButton]
      page_section_titles: [Result, "胜利"]
    harmony:
      present: true
      page_source: harmonyos/entry/src/main/ets/pages/ResultPage.ets
      capture: { kind: capture_harmony_step, step: battle+result }
    ios:
      present: true
      page_source: ios/WordMagicGame/Features/CoreLoop/ResultView.swift
      capture:
